variables:
  TZ: "America/New_York"
  # Configure postgres service (https://hub.docker.com/_/postgres/)
  POSTGRES_DB: custom_db
  POSTGRES_USER: custom_user
  POSTGRES_PASSWORD: custom_pass
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  APT_CACHE_DIR: "$CI_PROJECT_DIR/apt-cache"
  DEBIAN_FRONTEND: noninteractive
  IMAGE_TAG: 'egrep -o "[0-9]\.([0-9]|[0-9][0-9])(\.[0-9])?" faraday/__init__.py'
  AWS_FRONT_BRANCH: 'community/dev'
  VAULT_SERVER_URL: https://tluav-lb.faradaysec.com
  VAULT_AUTH_ROLE: faraday-env-readonly
  VAULT_AUTH_PATH: jwt
  FOLDER: dev
  # UV configuration
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  UV_PROJECT_ENVIRONMENT: "$CI_PROJECT_DIR/.venv"

workflow:
  rules:
    # Webhook-triggered Claude review pipeline
    - if: $RUN_CLAUDE_REVIEW == "1"
      when: always
    - if: $CI_MERGE_REQUEST_ID
      when: never
    - when: always

cache:
  key:
    files:
      - uv.lock
      - .python-version
  paths:
    - "$CI_PROJECT_DIR/.cache/pip"
    - "$CI_PROJECT_DIR/apt-cache"
    - "$CI_PROJECT_DIR/.cache/uv"
    - "$CI_PROJECT_DIR/.venv"
  policy: pull-push

before_script:
    - mkdir -pv $APT_CACHE_DIR

include:
  # Always-available config (anchors, vault secrets, review job itself)
  - local: .gitlab/ci/get-secrets.yml
  - local: .gitlab/ci/.rules-conditions.yml
  - local: .gitlab/ci/review/.claude-review-gitlab-ci.yml

  # Everything below is skipped when RUN_CLAUDE_REVIEW=1 so a webhook-triggered
  # review pipeline contains only the claude_review job. Gated at load time
  # here in addition to per-anchor `*skip-claude`, so naked jobs and external
  # templates (Secret-Detection) are also excluded.
  - template: Jobs/Secret-Detection.gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"

  - local: .gitlab/ci/testing/.pretesting-gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"
  - local: .gitlab/ci/testing/.uv-testing-gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"
  - local: .gitlab/ci/testing/.venv-testing-gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"

  - local: .gitlab/ci/build-ci/.uv-prebuild-gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"
  - local: .gitlab/ci/build-ci/.build-gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"
  - local: .gitlab/ci/build-ci/.testing-gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"

  - local: .gitlab/ci/upload/.storage-gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"

  - local: .gitlab/ci/deploy/deploy-gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"

  - local: .gitlab/ci/publish/.set-tag-gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"
  - local: .gitlab/ci/publish/.mirror-to-github-gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"
  - local: .gitlab/ci/publish/.docker-publish-gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"

  - template: Security/Secret-Detection.gitlab-ci.yml
    rules:
      - if: $RUN_CLAUDE_REVIEW != "1"

stages:
    - review
    - pre_testing
    - test
    # - post_testing
    - pre_build
    - build
    - build_testing
    - upload
    - upload_testing
    - deploy
    - publish

services:
    - postgres:latest
    - redis:latest
