# Skip every job when a Claude-review-only pipeline is triggered
# (webhook sets RUN_CLAUDE_REVIEW=1; only the claude_review job runs).
.skip-claude: &skip-claude
  if: $RUN_CLAUDE_REVIEW == "1"
  when: never

# When should run
.dev-staging-master:
  rules:
    - *skip-claude
    - if: '$CI_COMMIT_REF_NAME =~ /^.*\/(master|staging|dev)$/'
      when: on_success

.on-master-staging:
  rules:
    - *skip-claude
    - if: '$CI_COMMIT_REF_NAME =~ /^.*\/(master|staging)$/'
      when: on_success

.on-staging:
  rules:
    - *skip-claude
    - if: '$CI_COMMIT_REF_NAME =~ /^.*\/(staging)$/'
      when: on_success

.on-master:
  rules:
    - *skip-claude
    - if: '$CI_COMMIT_REF_NAME =~ /^.*\/(master)$/'
      when: on_success

.on-community-tag:
  rules:
    - *skip-claude
    - if: '$CI_COMMIT_TAG =~ /^white-v[0-9.]+$/'
      when: on_success

.pipeline-control-test:
  rules:
    - *skip-claude
    - if: $FULL_TEST || $DAILY_TEST
      when: on_success

.be-built:
  rules:
    - *skip-claude
    - if: '$CI_COMMIT_TAG || $BUILD_TEST || $FULL_TEST || $DAILY_TEST'
      when: on_success

.be-uploaded:
  rules:
    - *skip-claude
    - if: '$BUILD_TEST || $FULL_TEST || $DAILY_TEST'
      when: on_success


# Ignore
.ignore-on-tag:
  rules:
    - *skip-claude
    - if: '$CI_COMMIT_TAG'
      when: never

.ignore-on-master:
  rules:
    - *skip-claude
    - if: '$CI_COMMIT_REF_NAME =~ /^.*\/(master)$/'
      when: never

.ignore-on-staging:
  rules:
    - *skip-claude
    - if: '$CI_COMMIT_REF_NAME =~ /^.*\/(staging)$/'
      when: never

.ignore-on-build:
  rules:
    - *skip-claude
    - if: $BUILD_TEST
      when: never

.update_docker:
  rules:
    - *skip-claude
    - if: $UPDATE_DOCKER_TEST
      when: on_success
