# Block MR pipelines from every anchor so existing jobs stay branch-only
# once the workflow:rules carve-out lets MR pipelines start (for claude_review).
.mr-never: &mr-never
  if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  when: never

# When should run
.dev-staging-master:
  rules:
    - *mr-never
    - if: '$CI_COMMIT_REF_NAME =~ /^.*\/(master|staging|dev)$/'
      when: on_success

.on-master-staging:
  rules:
    - *mr-never
    - if: '$CI_COMMIT_REF_NAME =~ /^.*\/(master|staging)$/'
      when: on_success

.on-staging:
  rules:
    - *mr-never
    - if: '$CI_COMMIT_REF_NAME =~ /^.*\/(staging)$/'
      when: on_success

.on-master:
  rules:
    - *mr-never
    - if: '$CI_COMMIT_REF_NAME =~ /^.*\/(master)$/'
      when: on_success

.on-community-tag:
  rules:
    - *mr-never
    - if: '$CI_COMMIT_TAG =~ /^white-v[0-9.]+$/'
      when: on_success

.pipeline-control-test:
  rules:
    - *mr-never
    - if: $FULL_TEST || $DAILY_TEST
      when: on_success

.be-built:
  rules:
    - *mr-never
    - if: '$CI_COMMIT_TAG || $BUILD_TEST || $FULL_TEST || $DAILY_TEST'
      when: on_success

.be-uploaded:
  rules:
    - *mr-never
    - if: '$BUILD_TEST || $FULL_TEST || $DAILY_TEST'
      when: on_success


# Ignore
.ignore-on-tag:
  rules:
    - *mr-never
    - if: '$CI_COMMIT_TAG'
      when: never

.ignore-on-master:
  rules:
    - *mr-never
    - if: '$CI_COMMIT_REF_NAME =~ /^.*\/(master)$/'
      when: never

.ignore-on-staging:
  rules:
    - *mr-never
    - if: '$CI_COMMIT_REF_NAME =~ /^.*\/(staging)$/'
      when: never

.ignore-on-build:
  rules:
    - *mr-never
    - if: $BUILD_TEST
      when: never

.update_docker:
  rules:
    - *mr-never
    - if: $UPDATE_DOCKER_TEST
      when: on_success

.ignore-on-mr:
  rules:
    - *mr-never

.on-mr-ready:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DRAFT == "false" && $CI_MERGE_REQUEST_TITLE !~ /^(Draft|WIP):/i'
      when: on_success
